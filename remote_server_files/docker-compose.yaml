services:
  tts-api:
    image: remote_server_files-tts-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tts-api
    working_dir: /app
    init: true
    environment:
      # Varsayılan TTS modeli (istekle override edilebilir)
      TTS_MODEL: "facebook/mms-tts-tur"
      # HuggingFace model cache (volume'a bağlı — container yeniden başlayınca model tekrar inmez)
      HF_HOME: "/app/hf_cache"
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/app/hf_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  hf_cache:
