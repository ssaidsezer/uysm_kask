version: "3.9"

services:
  tts-api:
    build: .
    container_name: tts-api
    working_dir: /app
    environment:
      # Varsayılan TTS modeli (istekle override edilebilir)
      TTS_MODEL: "facebook/mms-tts-tur"
      # HuggingFace model cache (volume'a bağlı — container yeniden başlayınca model tekrar inmez)
      HF_HOME: "/app/hf_cache"
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/app/hf_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    restart: unless-stopped

volumes:
  hf_cache:
